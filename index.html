<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mica.TheRock</title>
    <link rel="stylesheet" href="style.css">
  </head>

  <body>
    
    <div id="panel">
      <button type="button" id="menuButton">≡</button>
      <div id="sideMenu">
        <hr>
        <button type="button" id="change_color" onclick="bgColorChange()">Change background :D</button>
        <hr>
        <div id="navigation">
          <a href="#about">About me</a>
          <a href="#interests">Interests</a>
        </div>
      </div>
    </div>

    <main>
      <section id="about" class="section">
        <h1>Who I am:</h1>
        <p>My name is <b>Mica!</b><Br>I'm a 16-year-old programmer from <span style="color:red;">Poland</span>!</p>
        <p>I speak English and Polish fluently, and a little German</p>
        <p>Pronouns: They/Them</p>
        <p>I'm <a href="https://lgbtqia.fandom.com/wiki/Agender" class="Agender" target="_blank">Agender</a> and <a href="https://lgbtqia.fandom.com/wiki/Aromantic_asexual" class="Aroace" target="_blank">AroAce</a></p>
        <div id="flags">
          <a href="https://lgbtqia.fandom.com/wiki/Agender" class="Agender" target="_blank"><img src="agender.png" alt="Agender flag" id="agender_flag"></a>
          <a href="https://lgbtqia.fandom.com/wiki/Aromantic_asexual" class="Aroace" target="_blank"><img src="aroace.png" alt="Aroace flag" id="aroace_flag"></a>
        </div>
      </section>

      <section id="interests" class="section">
        <h1>My Interests:</h1>
        <div id="interestsLists">
          <div class="interestBox">
            <h2>Games</h2>
          </div>
          <div class="interestBox">
            <h2>Music</h2>
          </div>
          <div class="interestBox">
            <h2>Movies</h2>
          </div>
          <div class="interestBox">
            <h2>Programming</h2>
          </div>
        </div>
      </section>
    </main>

    <footer>
      <span style="color:white;">Actively being developed</span>
    </footer>


    <script>
      const body = document.body
      const colorButton = document.getElementById("change_color")
      const sections = document.querySelectorAll(".section")
      const panel = document.getElementById("panel")
      const menuButton = document.getElementById("menuButton")
      const sideMenu = document.getElementById("sideMenu")
      const interestBoxes = document.querySelectorAll(".interestBox")
      let bgColorIndex = 0
      let currentHoverColor = 'aquamarine'
      function bgColorChange(){
        if (bgColorIndex === 0 ){
          body.style.backgroundImage='url("bg_tile_green.png")'
          currentHoverColor = 'blueviolet'
          sections.forEach(section => {
            section.style.borderColor='paleturquoise'
          });
          sideMenu.style.backgroundColor='mediumseagreen'
          sideMenu.style.borderColor='green'
          interestBoxes.forEach(interestBox => {
            interestBox.style.borderColor='paleturquoise'
          });
          bgColorIndex = 1
        }
        else{
          body.style.backgroundImage='url("bg_tile_purple.png")'
          currentHoverColor = "aquamarine"
          sections.forEach(section => {
            section.style.borderColor='palevioletred'
          });
          sideMenu.style.backgroundColor='mediumslateblue'
          sideMenu.style.borderColor='mediumorchid'
          interestBoxes.forEach(interestBox => {
            interestBox.style.borderColor='palevioletred'
          });
          bgColorIndex = 0
        }
        colorButton.style.backgroundColor = currentHoverColor
        
        }
        colorButton.onmouseenter = function() {
          colorButton.style.backgroundColor = currentHoverColor
        }
        colorButton.onmouseleave = function() {
          colorButton.style.backgroundColor = ''
        }

        
        menuButton.onclick = function(){
          panel.classList.toggle("open");
        }
    </script>
  </body>
</html>
