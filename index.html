<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mica.TheRock</title>
    <link rel="stylesheet" href="style.css">
  </head>

  <body id="body">
    <script>
      const body = document.getElementById("body")
      let bgcolorindex = 0
      function bgcolorchange(){
        if (bgcolorindex === 0 ){
          body.style.backgroundImage='url("bg_tile_green.png")'
          bgcolorindex = 1
        }
        else{
          body.style.backgroundImage='url("bg_tile_purple.png")'
          bgcolorindex = 0
        }
      }
    </script>

    <header>
      <button type="button" id="change_color" onclick="bgcolorchange()">Change back-ground</button>
    </header>

    <main>

    </main>

    <footer>

    </footer>
  </body>

</html>
